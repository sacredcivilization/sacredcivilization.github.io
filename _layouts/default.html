<!DOCTYPE html>
<html lang="en" prefix="og: https://ogp.me/ns#">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ══ TITLE ══ -->
  <title>{% if page.title %}{{ page.title }} — {% endif %}Al-Vid Scriptorium · Sacred Civilization Research Archive</title>

  <!-- ══ CORE SEO ══ -->
  <meta name="description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <meta name="keywords" content="Sacred Civilization Research Archive, SCRA, Al-Vid Scriptorium, Saad Khizar Bosal, Mandi Bahauddin, Henry Corbin, Ibn Arabi, Mulla Sadra, Suhrawardi, Warasat al-Anbiya, Khorasan Codes, civilizational transmission, Islamic metaphysics, digital manuscript repository, version-controlled archive, sacred history">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- ══ OPEN GRAPH — SOCIAL SHARING CARDS ══ -->
  <meta property="og:site_name" content="Al-Vid Scriptorium · Sacred Civilization Research Archive">
  <meta property="og:locale" content="en_US">
  <meta property="og:type" content="{% if page.layout == 'page' %}article{% else %}website{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — Al-Vid Scriptorium{% else %}Al-Vid Scriptorium · Sacred Civilization Research Archive{% endif %}">
  <meta property="og:description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ site.url }}/assets/images/og-default.png">
  <meta property="og:image:secure_url" content="{{ site.url }}/assets/images/og-default.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Al-Vid Scriptorium — Version-Controlled Digital Manuscript Repository — Sacred Civilization Research Archive">

  <!-- ══ TWITTER / X CARD ══ -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — Al-Vid Scriptorium{% else %}Al-Vid Scriptorium · Sacred Civilization Research Archive{% endif %}">
  <meta name="twitter:description" content="{% if page.description %}{{ page.description | strip_newlines | strip }}{% else %}{{ site.description | strip_newlines | strip }}{% endif %}">
  <meta name="twitter:image" content="{{ site.url }}/assets/images/og-default.png">
  <meta name="twitter:image:alt" content="Al-Vid Scriptorium — Sacred Civilization Research Archive">

  <!-- ══ SCHEMA.ORG — SITE-WIDE @GRAPH ══ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "{{ site.url }}/#website",
        "url": "{{ site.url }}",
        "name": "Al-Vid Scriptorium · Sacred Civilization Research Archive",
        "alternateName": "SCRA",
        "description": "{{ site.description | strip_newlines | strip }}",
        "inLanguage": "en-US",
        "publisher": { "@id": "{{ site.url }}/#archive" }
      },
      {
        "@type": "ArchiveOrganization",
        "@id": "{{ site.url }}/#archive",
        "name": "Sacred Civilization Research Archive",
        "alternateName": ["Al-Vid Scriptorium", "SCRA", "Al-Vid Scriptorium Repository"],
        "url": "{{ site.url }}",
        "description": "{{ site.description | strip_newlines | strip }}",
        "foundingDate": "2026",
        "knowsAbout": [
          "Islamic Metaphysics",
          "Civilizational Transmission",
          "Prophetic Inheritance",
          "Khorasan Studies",
          "Sufi Philosophy",
          "Sacred Geography",
          "Warasat al-Anbiya",
          "Ibn Arabi",
          "Mulla Sadra",
          "Suhrawardi",
          "Henry Corbin"
        ],
        "founder": {
          "@type": "Person",
          "@id": "{{ site.url }}/#founder",
          "name": "Saad Khizar Bosal",
          "jobTitle": "Framework Architect",
          "worksFor": { "@id": "{{ site.url }}/#archive" },
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Mandi Bahauddin",
            "addressRegion": "Punjab",
            "addressCountry": "PK"
          },
          "identifier": {
            "@type": "PropertyValue",
            "propertyID": "https://registry.identifiers.org/registry/orcid",
            "value": "0009-0004-9944-7378",
            "url": "https://orcid.org/0009-0004-9944-7378"
          },
          "sameAs": [
            "https://orcid.org/0009-0004-9944-7378",
            "https://alvidscriptorium.com/",
            "https://sorrow.alvidscriptorium.com/"
          ]
        },
        "sameAs": [
          "https://github.com/sacredcivilization/sacredcivilization.github.io",
          "https://alvidscriptorium.com/"
        ]
      }
    ]
  }
  </script>

  {% if page.url != '/' and page.title %}
  <!-- ══ SCHEMA.ORG — BREADCRUMB ══ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {
        "@type": "ListItem",
        "position": 1,
        "name": "Dargah Ghazi Kot",
        "item": "{{ site.url }}/"
      },
      {
        "@type": "ListItem",
        "position": 2,
        "name": "{{ page.title }}",
        "item": "{{ page.url | absolute_url }}"
      }
    ]
  }
  </script>
  {% endif %}

  {% if page.layout == 'page' and page.title %}
  <!-- ══ SCHEMA.ORG — PER-PAGE SCHOLARLY ARTICLE / BOOK ══ -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["ScholarlyArticle", "Book"],
    "@id": "{{ page.url | absolute_url }}#work",
    "name": "{{ page.title }}",
    "headline": "{{ page.title }}{% if page.subtitle %}: {{ page.subtitle }}{% endif %}",
    "description": "{% if page.description %}{{ page.description | strip_newlines | strip }}{% endif %}",
    "url": "{{ page.url | absolute_url }}",
    "inLanguage": "en",
    "author": { "@id": "{{ site.url }}/#founder" },
    "publisher": { "@id": "{{ site.url }}/#archive" },
    "isPartOf": { "@id": "{{ site.url }}/#website" },
    "genre": ["Islamic Metaphysics", "Civilizational Studies", "Sacred History", "Sufi Philosophy"],
    "isAccessibleForFree": true
  }
  </script>
  {% endif %}

  <!-- ══ FONTS ══ -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  {% include nav.html %}

  {{ content }}

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

  <!-- ══ SAMA AMBIENT PLAYER — Arabic Desert · Rumi · @culturecapitalmusic ══ -->
  <style>
  #yt-sama-wrap{position:fixed;top:-2px;left:-2px;width:2px;height:2px;overflow:hidden;opacity:0;pointer-events:none;z-index:-9}
  #sama-bar{position:fixed;bottom:26px;right:26px;z-index:9999}
  #sama-btn{display:flex;align-items:center;gap:7px;background:rgba(8,6,2,0.9);border:1px solid rgba(168,128,52,0.5);color:rgba(168,128,52,0.68);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;padding:9px 15px;cursor:pointer;border-radius:2px;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);transition:background 0.3s,border-color 0.3s,color 0.3s;animation:sama-pulse 3s ease-in-out infinite}
  #sama-btn:hover{background:rgba(168,128,52,0.1);border-color:rgba(190,152,70,0.85);color:rgba(200,165,80,1);animation:none}
  #sama-btn.live{background:rgba(168,128,52,0.1);border-color:rgba(190,152,70,0.85);color:rgba(200,165,80,0.95);animation:none}
  .sama-dot{width:5px;height:5px;border-radius:50%;background:rgba(168,128,52,0.55);flex-shrink:0;transition:background 0.3s,box-shadow 0.3s}
  #sama-btn.live .sama-dot{background:rgba(210,175,90,1);box-shadow:0 0 6px rgba(210,175,90,0.55)}
  @keyframes sama-pulse{0%,100%{box-shadow:0 0 0 0 rgba(168,128,52,0)}60%{box-shadow:0 0 0 5px rgba(168,128,52,0.16)}}
  </style>

  <div id="yt-sama-wrap" aria-hidden="true">
    <div id="yt-sama-player"></div>
  </div>

  <div id="sama-bar" role="complementary" aria-label="Ambient music control">
    <button id="sama-btn" onclick="toggleSama()" title="Toggle ambient Sama · Rumi Ney music">
      <span class="sama-dot"></span>
      <span id="sama-label">SAMA</span>
    </button>
  </div>

  <script>
  var _samaPlayer,_samaMuted=true;
  function _initSamaPlayer(){
    _samaPlayer=new YT.Player('yt-sama-player',{
      height:'1',width:'1',
      videoId:'ca_tnQMeE2I',
      playerVars:{autoplay:1,mute:1,loop:1,playlist:'ca_tnQMeE2I',controls:0,disablekb:1,fs:0,modestbranding:1,iv_load_policy:3,rel:0},
      events:{onReady:function(e){e.target.playVideo();}}
    });
  }
  /* Standard callback for when API loads fresh */
  window.onYouTubeIframeAPIReady=_initSamaPlayer;
  /* Fallback: API already cached and ready (browser hit from prior session) */
  if(window.YT&&window.YT.Player){_initSamaPlayer();}
  else{
    (function(){
      var s=document.createElement('script');
      s.src='https://www.youtube.com/iframe_api';
      document.head.appendChild(s);
    })();
  }
  /* Auto-unmute on first user gesture (browsers block unmuted autoplay) */
  var _samaAutoUnmuted=false;
  function _samaUnmuteOnGesture(){
    if(_samaAutoUnmuted)return;
    if(!_samaPlayer||typeof _samaPlayer.unMute!=='function')return;
    _samaAutoUnmuted=true;
    _samaPlayer.unMute();_samaPlayer.setVolume(32);
    _samaMuted=false;
    var btn=document.getElementById('sama-btn');
    var lbl=document.getElementById('sama-label');
    if(btn)btn.classList.add('live');
    if(lbl)lbl.textContent='SAMA ♪';
    ['click','scroll','touchstart','keydown'].forEach(function(ev){
      document.removeEventListener(ev,_samaUnmuteOnGesture,{passive:true});
    });
  }
  ['click','scroll','touchstart','keydown'].forEach(function(ev){
    document.addEventListener(ev,_samaUnmuteOnGesture,{passive:true});
  });
  function toggleSama(){
    if(!_samaPlayer||typeof _samaPlayer.unMute!=='function')return;
    _samaAutoUnmuted=true;
    var btn=document.getElementById('sama-btn');
    var lbl=document.getElementById('sama-label');
    if(_samaMuted){
      _samaPlayer.unMute();_samaPlayer.setVolume(32);
      _samaMuted=false;btn.classList.add('live');lbl.textContent='SAMA ♪';
    }else{
      _samaPlayer.mute();
      _samaMuted=true;btn.classList.remove('live');lbl.textContent='SAMA';
    }
  }
  </script>
</body>
</html>
